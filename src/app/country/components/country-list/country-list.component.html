<section class="mt-5">
  <table class="table table-md mt-2 w-full">
    <thead>
      <tr>
        <th>#</th>
        <th>Icono</th>
        <th>Bandera</th>
        <th>Nombre</th>
        <th>Capital</th>
        <th>Población</th>
        <th></th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let country of [1, 2, 3]">
        <td style="width: 150px">
          <img
            src="https://flagcdn.com/w320/ar.png"
            alt="Argentina"
            class="w-full h-auto object-cover"
          />
        </td>

        <td style="width: 250px">Argentina</td>
        <td style="width: 250px">Buenos Aires</td>
        <td style="width: 250px">45.000.000</td>
      </tr>
    </tbody>
  </table>
</section>

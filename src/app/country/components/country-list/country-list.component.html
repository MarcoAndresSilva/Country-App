<section class="mt-5">
  <table class="table table-md mt-2 w-full">
    <thead>
      <tr>
        <th>#</th>
        <th>Icono</th>
        <th>Bandera</th>
        <th>Nombre</th>
        <th>Capital</th>
        <th>Población</th>
        <th></th>
      </tr>
    </thead>

    <tbody>
      @for (country of countries(); track country.cca2; let index = $index) {
        <tr>
          <td>{{ index + 1 }}</td>
          <td>
            <img
              class="w-6 h-6 rounded-full"
              src="{{ country.flag }}"
              alt="{{ country.name }}"
            />
          </td>
          <td>
            <img
              src="{{ country.flagSvg }}"
              alt="{{ country.name }}"
              class="w-10"
            />
          </td>
          <td>{{ country.name }}</td>
          <td>{{ country.capital }}</td>
          <td>
            <span class="badge bg-secondary">
              {{ country.population | number }}
            </span>
          </td>
          <td>
            <a
              class="btn btn-sm btn-primary"
              [routerLink]="['/country/by', country.cca2]"
            >
              Ver detalles
            </a>
          </td>
        </tr>
      }
    </tbody>
  </table>
</section>

<h1 class="text-2xl"> Por region</h1>
<h3 class="text-lg">Seleccione la region</h3>

<section class="flex flex-col gap-4">
    <div class="flex-col">
        @for (region of regions; track region) {
        <button class="btn btn-outline">
            {{ region }}
        </button>
        }
    </div>
    <country-list [countries]="[]" />
